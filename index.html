<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Live Screener - Squeeze Pro Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0b0e11;--card:#181a20;--border:#2b3139;--text:#eaecef;--dim:#848e9c;--green:#0ecb81;--red:#f6465d;--accent:#fcd535;--orange:#f0b90b;--pink:#ff78f8;--blue:#3d7eff;--cyan:#00d4aa;--table-font:16px}
        *{box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;margin:0;padding:10px;overflow-x:hidden}
        body.modal-open{overflow:hidden}
        .header-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px}
        .search-box{flex:1;min-width:150px;position:relative;display:flex;align-items:center}
        .search-box input{width:100%;background:var(--card);border:1px solid var(--border);padding:8px 32px 8px 12px;border-radius:4px;color:#fff;outline:none;font-size:13px}
        .search-clear-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:3px;transition:all .15s;display:none}
        .search-clear-btn:hover{color:var(--text);background:rgba(255,255,255,0.1)}
        .search-clear-btn.visible{display:block}
        .size-control{display:flex;align-items:center;gap:8px;background:var(--card);padding:5px 12px;border-radius:4px;border:1px solid var(--border);font-size:11px}
        .size-control input[type=range]{-webkit-appearance:none;appearance:none;width:120px;height:6px;background:#2b3139;border-radius:3px;outline:none;cursor:pointer}
        .size-control input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;background:#3d7eff;border-radius:50%;cursor:pointer;border:2px solid #fff}
        .size-control input[type=range]::-moz-range-thumb{width:16px;height:16px;background:#3d7eff;border-radius:50%;cursor:pointer;border:2px solid #fff}
        .status-bar{flex:2;min-width:300px;background:#1e2026;padding:8px 15px;border-radius:8px;border:1px solid var(--border)}
        #scan-status{font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;font-weight:bold}
        #net-status{font-size:9px;color:var(--dim);margin-top:3px;letter-spacing:.5px;display:flex;gap:10px;flex-wrap:wrap}
        .ns-dot{width:6px;height:6px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:3px}
        .ns-dot.on{background:var(--green);box-shadow:0 0 4px var(--green)}
        .ns-dot.off{background:var(--red);box-shadow:0 0 4px var(--red);animation:blink 1s infinite}
        .ns-dot.warn{background:var(--orange);box-shadow:0 0 4px var(--orange)}
        @keyframes blink{50%{opacity:.3}}
        .tabs-wrapper{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:nowrap;overflow-x:auto}
        .view-switcher{display:flex;gap:5px;flex-shrink:0}
        .view-btn{padding:6px 14px;font-size:11px;cursor:pointer;border-radius:4px;color:var(--dim);background:var(--card);border:1px solid var(--border);font-weight:bold;white-space:nowrap;transition:all 0.2s}
        .view-btn:hover{color:var(--text);border-color:var(--dim)}
        .view-btn.active{color:#000;background:var(--accent);border-color:var(--accent);box-shadow:0 0 10px rgba(252,213,53,.2)}
        .tabs{display:flex;gap:5px;flex-shrink:0}
        .tab{padding:6px 14px;font-size:11px;cursor:pointer;border-radius:4px;color:var(--dim);background:var(--card);border:1px solid var(--border);font-weight:bold;white-space:nowrap}
        .tab.active{color:#000;background:var(--accent);border-color:var(--accent);box-shadow:0 0 15px rgba(252,213,53,.3)}
        .main-grid{display:flex;gap:10px;width:100%}
        .table-container{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;min-width:0}
        .table-container.watchlist-panel{flex:0 0 420px;min-width:340px}
        .view-hidden{display:none !important}
        .view-full{flex:1 !important}
        .table-title{padding:8px 12px;font-weight:900;font-size:13px;background:#1e2026;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .table-title .wl-count{font-size:10px;color:var(--dim);font-weight:600}
        .scroll-area{max-height:82vh;overflow-y:auto;width:100%;flex:1}
        table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:var(--table-font)}
        th{position:sticky;top:0;background:#1e2026;color:var(--dim);font-size:10px;padding:8px 2px;text-align:right;z-index:10;border-bottom:1px solid var(--border)}
        td{padding:6px 4px;text-align:right;border-bottom:1px solid rgba(255,255,255,.03);font-family:'JetBrains Mono',monospace;white-space:nowrap}
        th.active-header{color:var(--accent);background:#2c2f36;border-bottom:2px solid var(--accent)}
        td.active-col{background:rgba(252,213,53,.08)!important;font-weight:bold;color:#fff}
        .badge{font-size:7.5px;padding:1px 3px;border-radius:2px;margin-left:3px;font-weight:900;vertical-align:middle;text-transform:uppercase;display:inline-block}
        .top-badge{background:var(--accent);color:#000}
        .bo-badge{background:var(--green);color:#000;box-shadow:0 0 5px rgba(14,203,129,.3)}
        .d1-badge{background:var(--pink);color:#000}
        .sq-badge{background:var(--blue);color:#fff;box-shadow:0 0 5px rgba(61,126,255,.5)}
        .wb-badge{background:var(--blue);color:#ffffff;font-size:8px;padding:1px 4px;border-radius:2px;margin-left:5px;vertical-align:middle;font-weight:900;box-shadow:0 0 6px rgba(61,126,255,.5)}
        .golden-zone{background:linear-gradient(90deg,rgba(252,213,53,.12) 0%,transparent 100%)!important}
        .col-rank{width:25px;text-align:left;padding-left:5px}
        .col-sym{width:130px;text-align:left;position:sticky;left:0;background:var(--card);z-index:5;border-right:1px solid var(--border);color:#fff;font-weight:bold;cursor:pointer;transition:background .15s}
        .col-sym:hover{background:#252830}
        .col-pct{width:75px}
        .col-action{width:28px}
        .watchlist-panel .wl-sym{width:100px;text-align:left;position:sticky;left:0;background:var(--card);z-index:5;border-right:1px solid var(--border);color:#fff;font-weight:bold;cursor:pointer;transition:background .15s}
        .watchlist-panel .wl-sym:hover{background:#252830}
        .watchlist-panel .wl-price{width:75px}.watchlist-panel .wl-pct{width:65px}.watchlist-panel .wl-vol{width:75px;color:var(--orange)}.watchlist-panel .wl-avol{width:75px;color:var(--blue)}.watchlist-panel .wl-action{width:28px}
        .btn-remove{background:none;border:1px solid var(--border);color:var(--dim);cursor:pointer;border-radius:3px;font-size:14px;line-height:1;padding:2px 5px;transition:all .15s}
        .btn-remove:hover{background:var(--red);color:#fff;border-color:var(--red)}
        .btn-add{background:none;border:1px solid var(--border);color:var(--dim);cursor:pointer;border-radius:3px;font-size:11px;line-height:1;padding:2px 5px;transition:all .15s}
        .btn-add:hover{background:var(--accent);color:#000;border-color:var(--accent)}
        .wl-empty{text-align:center;padding:40px 10px;color:var(--dim);font-size:12px}
        .wl-empty span{font-size:20px;display:block;margin-bottom:8px;opacity:.4}
        .green{color:var(--green)}.red{color:var(--red)}
        .chart-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg);display:none;flex-direction:column}
        .chart-overlay.open{display:flex}
        .chart-topbar{display:flex;align-items:center;padding:6px 8px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;min-height:44px;gap:6px;flex-wrap:nowrap}
        .chart-tb-left{display:flex;gap:4px;flex-shrink:0;order:1}
        .chart-tb-center{flex:1;display:flex;align-items:center;gap:6px;overflow-x:auto;justify-content:center;order:2;min-width:0}
        .chart-tb-right{display:flex;gap:4px;flex-shrink:0;order:3;align-items:center;overflow-x:auto}
        .chart-sym-name{font-size:17px;font-weight:900;color:var(--accent);white-space:nowrap}
        .chart-info{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--dim);display:flex;gap:10px;align-items:center;white-space:nowrap;overflow-x:auto}
        .chart-info .ci-val{color:var(--text)}
        .chart-tf-btns{display:flex;gap:3px;flex-shrink:0}
        .ctf{padding:4px 8px;font-size:10px;cursor:pointer;border-radius:3px;color:var(--dim);background:transparent;border:1px solid var(--border);font-weight:700;font-family:'JetBrains Mono',monospace;transition:all .15s;white-space:nowrap}
        .ctf.active{color:#000;background:var(--accent);border-color:var(--accent)}
        .ctf:hover:not(.active){color:var(--text);border-color:var(--dim)}
        .chart-close,.chart-settings-btn,.chart-watch-btn{background:none;border:1px solid var(--border);color:var(--dim);cursor:pointer;font-size:18px;width:32px;height:32px;border-radius:4px;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .chart-close:hover{background:var(--red);color:#fff;border-color:var(--red)}
        .chart-settings-btn:hover,.chart-settings-btn.active-btn{background:var(--accent);color:#000;border-color:var(--accent)}
        .chart-watch-btn:hover{background:var(--accent);color:#000;border-color:var(--accent)}
        .chart-watch-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
        .chart-body{flex:1;position:relative;overflow:hidden;cursor:crosshair;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
        .chart-body canvas{display:block;width:100%;height:100%}
        .ind-panel{position:absolute;top:0;right:0;width:282px;max-width:82vw;height:100%;background:#13161c;border-left:1px solid var(--border);z-index:100;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;touch-action:auto}
        .ind-panel.open{transform:translateX(0)}
        .ind-panel-head{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
        .ind-panel-head span{font-weight:900;font-size:11px;color:var(--accent);letter-spacing:.5px}
        .ind-panel-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px;border-radius:3px;transition:all .15s}
        .ind-panel-close:hover{color:var(--red)}
        .ind-panel-body{flex:1;overflow-y:auto;padding:8px 0;-webkit-overflow-scrolling:touch}
        .ind-section{padding:4px 12px 10px}
        .ind-section-title{font-size:8px;font-weight:900;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.05)}
        .ind-row{display:flex;align-items:center;gap:5px;margin-bottom:6px}
        .ind-toggle{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;cursor:pointer;color:var(--text);min-width:56px}
        .ind-toggle input{display:none}
        .ind-toggle .sw{width:26px;height:14px;border-radius:7px;background:#2b3139;position:relative;transition:background .2s;flex-shrink:0}
        .ind-toggle .sw::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:var(--dim);transition:all .2s}
        .ind-toggle input:checked+.sw{background:var(--green)}
        .ind-toggle input:checked+.sw::after{left:14px;background:#fff}
        .ind-period{width:40px;background:#1e2026;border:1px solid var(--border);color:var(--text);padding:3px 4px;border-radius:3px;font-size:10px;font-family:'JetBrains Mono',monospace;text-align:center;outline:none}
        .ind-period:focus{border-color:var(--accent)}
        .ind-width{width:34px;background:#1e2026;border:1px solid var(--border);color:var(--text);padding:3px 2px;border-radius:3px;font-size:9px;font-family:'JetBrains Mono',monospace;text-align:center;outline:none}
        .ind-width:focus{border-color:var(--accent)}
        .ind-check{margin-left:4px;width:16px;height:16px;accent-color:var(--green);cursor:pointer}
        .sty-btn{font-size:12px;padding:0 3px;border-radius:2px;cursor:pointer;color:var(--dim);border:1px solid transparent;transition:all .1s;line-height:1}
        .sty-btn.active{color:var(--accent);border-color:var(--accent)}
        .sty-btn:hover:not(.active){color:var(--text)}
        .ind-color{width:18px;height:18px;border-radius:3px;cursor:pointer;border:2px solid transparent;transition:border-color .15s;flex-shrink:0}
        .ind-color:hover{border-color:var(--text)}
        .ind-sub{display:flex;align-items:center;gap:6px;margin-bottom:5px;padding-left:0}
        .ind-label-sm{font-size:8px;color:var(--dim);font-weight:700;letter-spacing:.3px}
        .cp-popup{position:fixed;z-index:10002;display:none;background:#1e2026;border:1px solid var(--border);border-radius:8px;padding:6px;flex-wrap:wrap;gap:4px;width:116px;box-shadow:0 4px 24px rgba(0,0,0,.7)}
        .cp-popup.show{display:flex}
        .cpick{width:22px;height:22px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:all .1s}
        .cpick:hover{border-color:#fff;transform:scale(1.15)}
        .ind-reset{display:block;margin:8px 12px 14px;padding:7px;text-align:center;background:transparent;border:1px solid var(--border);color:var(--dim);font-size:9px;font-weight:700;border-radius:4px;cursor:pointer;transition:all .15s;letter-spacing:.5px}
        .ind-reset:hover{border-color:var(--red);color:var(--red)}
        .panel-reorder-section{border-top:1px solid var(--border);margin-top:8px;padding-top:10px}
        .panel-reorder-item{display:flex;align-items:center;gap:6px;padding:6px 8px;margin-bottom:4px;background:#1e2026;border:1px solid var(--border);border-radius:4px;cursor:grab;transition:background .15s,transform .1s;user-select:none}
        .panel-reorder-item:active{cursor:grabbing}
        .panel-reorder-item.dragging{opacity:0.4;transform:scale(0.95)}
        .panel-reorder-item .drag-handle{color:var(--dim);font-size:12px;flex-shrink:0;width:16px;text-align:center}
        .panel-reorder-item .panel-name{font-size:10px;font-weight:700;color:var(--text);flex:1}
        .panel-reorder-item .panel-toggle{display:flex;align-items:center}
        .panel-reorder-item .panel-toggle input{display:none}
        .panel-reorder-item .panel-toggle .sw2{width:22px;height:12px;border-radius:6px;background:#2b3139;position:relative;transition:background .2s}
        .panel-reorder-item .panel-toggle .sw2::after{content:'';position:absolute;top:2px;left:2px;width:8px;height:8px;border-radius:50%;background:var(--dim);transition:all .2s}
        .panel-reorder-item .panel-toggle input:checked+.sw2{background:var(--green)}
        .panel-reorder-item .panel-toggle input:checked+.sw2::after{left:12px;background:#fff}
        .panel-reorder-item .panel-toggle input:disabled+.sw2{opacity:0.4;cursor:not-allowed}
        .ai-panel{position:absolute;top:0;left:0;width:360px;max-width:88vw;height:100%;background:#13161c;border-right:1px solid var(--border);z-index:100;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;touch-action:auto}
        .ai-panel.open{transform:translateX(0)}
        .ai-panel-head{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
        .ai-panel-head span{font-weight:900;font-size:11px;color:var(--accent);letter-spacing:.5px}
        .ai-panel-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px;border-radius:3px;transition:all .15s}
        .ai-panel-close:hover{color:var(--red)}
        .ai-chat-body{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:8px}
        .ai-msg{padding:8px 12px;border-radius:8px;font-size:13px;line-height:1.65;max-width:94%;white-space:pre-wrap;word-break:break-word}
        .ai-msg.user{background:var(--accent);color:#000;align-self:flex-end;border-bottom-right-radius:2px}
        .ai-msg.ai{background:#1e2026;color:var(--text);align-self:flex-start;border-bottom-left-radius:2px;border:1px solid var(--border)}
        .ai-msg.system{background:#1e2026;color:var(--accent);align-self:flex-start;border-bottom-left-radius:2px;border:1px solid var(--border)}
        .ai-msg.ai.loading{color:var(--dim);font-style:italic;align-self:flex-start}
        .ai-msg.system.loading{color:var(--dim);font-style:italic;align-self:flex-start}
        .ai-msg .ai-bold{font-weight:700}
        .ai-input-area{display:flex;gap:6px;padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0}
        .ai-input{flex:1;background:#1e2026;border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:12px;font-family:'Inter',sans-serif;outline:none;resize:none;max-height:80px;min-height:32px}
        .ai-input:focus{border-color:var(--accent)}
        .ai-input::placeholder{color:var(--dim)}
        .ai-send{background:var(--accent);color:#000;border:none;border-radius:6px;padding:8px 14px;font-weight:900;font-size:12px;cursor:pointer;transition:all .15s;flex-shrink:0}
        .ai-send:hover:not(:disabled){box-shadow:0 0 12px rgba(252,213,53,.4)}
        .ai-send:disabled{opacity:.5;cursor:not-allowed}
        @media(max-width:1100px){.main-grid{flex-direction:column}.table-container.watchlist-panel{flex:none;min-width:0}.chart-tb-center{justify-content:flex-start}}
    </style>
</head>
<body>
<div class="header-row">
    <div class="search-box">
        <input type="text" id="cryptoSearch" placeholder="Search Assets..." oninput="render();toggleSearchClearBtn()">
        <button class="search-clear-btn" id="searchClearBtn" onclick="clearSearch()" title="Clear">&#10005;</button>
    </div>
    <div class="size-control"><span>A-</span><input type="range" min="8" max="18" value="13" id="sizeSlider" oninput="updateSize(this.value)"><span>A+</span></div>
    <div class="status-bar"><div id="scan-status">Initializing...</div><div id="net-status"></div></div>
</div>
<div class="tabs-wrapper">
    <div class="view-switcher">
        <button id="btn-view-screener" class="view-btn active" onclick="switchView('screener')">SCREENER</button>
        <button id="btn-view-watchlist" class="view-btn" onclick="switchView('watchlist')">WATCHLIST</button>
        <button id="btn-filter-wb" class="view-btn" onclick="toggleWBFilter()">🐋 WHALE BUY 15M</button>
    </div>
    <div class="tabs">
        <div class="tab" id="tab-5m" onclick="setRank('5m')">5M</div>
        <div class="tab active" id="tab-15m" onclick="setRank('15m')">15M</div>
        <div class="tab" id="tab-1h" onclick="setRank('1h')">1H</div>
        <div class="tab" id="tab-1w" onclick="setRank('1w')">1W</div>
        <div class="tab" id="tab-1mo" onclick="setRank('1mo')">1MO</div>
        <div class="tab" id="tab-24h" onclick="setRank('24h')">24H</div>
    </div>
</div>
<div class="main-grid">
    <div class="table-container" id="screener-container">
        <div class="table-title" style="color:var(--green)">LIVE SCREENER <span style="font-size:9px;color:var(--dim);font-weight:500;margin-left:8px">Click symbol for chart · + to watch</span></div>
        <div class="scroll-area"><table><thead><tr>
            <th class="col-rank">#</th><th class="col-sym">Symbol</th><th class="col-pct">15M%</th><th class="col-pct">24H%</th><th class="col-action"></th>
        </tr></thead><tbody id="gainers-body"></tbody></table></div>
    </div>
    <div class="table-container watchlist-panel" id="watchlist-container">
        <div class="table-title" style="color:var(--accent)"><span>&#9733; WATCHLIST</span><span class="wl-count" id="wl-count">0 assets</span></div>
        <div class="scroll-area"><table><thead><tr>
            <th class="col-rank">#</th><th class="wl-sym">Symbol</th><th class="wl-price">Price</th>
            <th class="wl-pct" data-tf="24h">24H%</th><th class="wl-vol">24H Vol</th><th class="wl-avol">AvgD Vol</th><th class="wl-action"></th>
        </tr></thead><tbody id="watchlist-body"></tbody></table>
        <div class="wl-empty" id="wl-empty"><span>+</span>Click + on any symbol to start tracking</div></div>
    </div>
</div>
<div class="chart-overlay" id="chartOverlay">
    <div class="chart-topbar">
        <div class="chart-tb-left">
            <button class="chart-close" onclick="closeChart()">&#10005;</button>
            <button class="chart-settings-btn" id="chartSettingsBtn" onclick="toggleIndPanel()">&#9881;</button>
            <button class="chart-settings-btn" id="chartAiBtn" onclick="toggleAiPanel()">&#129302;</button>
        </div>
        <div class="chart-tb-center">
            <span class="chart-sym-name" id="chartSymName">BTC</span>
            <button class="chart-watch-btn" id="chartWatchBtn" onclick="toggleChartWatch()" title="Add to Watchlist">&#9734;</button>
            <div class="chart-tf-btns" id="chartTfBtns">
                <span class="ctf" data-iv="1m" onclick="changeChartTf('1m')">1m</span>
                <span class="ctf" data-iv="5m" onclick="changeChartTf('5m')">5m</span>
                <span class="ctf" data-iv="15m" onclick="changeChartTf('15m')">15m</span>
                <span class="ctf" data-iv="1h" onclick="changeChartTf('1h')">1h</span>
                <span class="ctf" data-iv="4h" onclick="changeChartTf('4h')">4h</span>
                <span class="ctf active" data-iv="1d" onclick="changeChartTf('1d')">1d</span>

// ============ RATE-LIMITED FETCH ============
async function safeFetch(path,weight){
    while(restPaused && !chartOperationsActive){ var w=restPauseUntil-Date.now(); if(w<=0){ restPaused=false; restWeightUsed=0; restWindowStart=Date.now(); break; } updateNetStatus(); await new Promise(function(r){ setTimeout(r,Math.min(w,2000)); }); }
    var att=0; while(att<30){ att++; var now=Date.now(); if(now-restWindowStart>=60000){ restWeightUsed=0; restWindowStart=now; } if(restWeightUsed+weight<=2100) break; var sl=60000-(now-restWindowStart)+500; updateNetStatus(); await new Promise(function(r){ setTimeout(r,Math.min(sl,1000)); }); }
    restWeightUsed+=weight; updateNetStatus();
    try{
        var res=await fetch(API_URL+path,{signal:AbortSignal.timeout(8000)});
        try{ var hw=res.headers.get('x-mbx-used-weight-1m'); if(hw){ restWeightUsed=parseInt(hw)||restWeightUsed; restWindowStart=Date.now(); } }catch(e){}
        updateNetStatus();
        if(res.status===429){ restPaused=true; restPauseUntil=Date.now()+60000; restWeightUsed=99999; updateNetStatus(); return null; }
        return res;
    } catch(e){ restWeightUsed=Math.max(0,restWeightUsed-weight); updateNetStatus(); throw e; }
}

            var sym = t.s, price = parseFloat(t.c), qVol = parseFloat(t.q) || 0, open24 = parseFloat(t.o) || 0;
            if(!pairs[sym]){ pairs[sym] = { symbol: sym.replace('USDT',''), price: price, vol24h: qVol, '24h': 0, o5m: null, o15m: null, o1h: null, o1w: null, o1mo: null, sqz: {'5m':false,'15m':false,'1h':false,'1d':false,'d50':false}, v5m:0, v15m:0, v1h:0, '5m':0,'15m':0,'1h':0,'1w':0,'1mo':0, avgDVol: 0, wb15m: false }; }

            var p = pairs[sym]; if(p.o15m != null) p['15m'] = ((p.price - p.o15m) / p.o15m * 100);
        }
        scheduleRender();
    } catch(e) { console.warn('WS parse error:', e); }
};
mainWs.onclose=function(){ wsAlive=false; updateNetStatus(); setTimeout(function(){ if(!wsAlive) connectMainWs(); },3000); };

}

}

function calculatePcts(sym){ var p = pairs[sym]; if(p.o5m != null) p['5m'] = ((p.price - p.o5m) / p.o5m * 100); if(p.o15m != null) p['15m'] = ((p.price - p.o15m) / p.o15m * 100); if(p.o1h != null) p['1h'] = ((p.price - p.o1h) / p.o1h * 100); if(p.o1w != null) p['1w'] = ((p.price - p.o1w) / p.o1w * 100); if(p.o1mo != null) p['1mo'] = ((p.price - p.o1mo) / p.o1mo * 100); }
function getTopSyms(){ var l = Object.values(pairs); l.sort(function(a,b){ return (b.vol24h||0) - (a.vol24h||0); }); var t60 = l.slice(0,60).map(function(p){ return p.symbol; }); var wl = Array.from(watchlist); var seen = {}, u = []; for(var i = 0; i < t60.length + wl.length; i++){ var s = i < t60.length ? t60[i] : wl[i - t60.length]; if(!seen[s]){ seen[s] = true; u.push(s); } } return u; }

function formatVol(v){ if(!v) return '0'; if(v >= 1e9) return (v/1e9).toFixed(1)+'B'; if(v >= 1e6) return (v/1e6).toFixed(1)+'M'; return Math.round(v).toLocaleString(); }
function buildBadges(p,leaders,tfs){ var b='', ig=false; for(var i=0;i<tfs.length;i++){ if(leaders[tfs[i]]===p.symbol){ b+='<span class="badge top-badge">'+tfs[i]+'</span>'; ig=true; } } if(p.sqz['5m']) b+='<span class="badge bo-badge">5M</span>'; if(p.sqz['15m']) b+='<span class="badge bo-badge">15M</span>'; if(p.sqz['1h']) b+='<span class="badge bo-badge">1H</span>'; if(p.sqz['1d']) b+='<span class="badge d1-badge">1D</span>'; if(p.sqz['d50']) b+='<span class="badge sq-badge">SQZ 50</span>'; return {badges:b, isGolden:ig}; }

function render(){
    highlightHeaders();
    var q = document.getElementById('cryptoSearch').value.toUpperCase();
    var fl = []; for(var k in pairs) fl.push(pairs[k]);
    var tfs = ['5m','15m','1h','1w','1mo','24h'], ld = {};
    for(var ti = 0; ti < tfs.length; ti++){
        var tf = tfs[ti], top = {tf: -999};
        for(var fi = 0; fi < fl.length; fi++){ if((fl[fi][tf] || -999) > (top[tf] || -999)) top = fl[fi]; }
        if(top.symbol) ld[tf] = top.symbol;
    }
    var list = q ? fl.filter(function(p){ return p.symbol.indexOf(q) !== -1; }) : fl;
    list.sort(function(a,b){ return (b[rankBy]||-999) - (a[rankBy]||-999); });
    
    // Apply Whale Buy Filter
    if(showOnlyWB){ list = list.filter(function(p){ return p.wb15m === true; }); }
    
    var t60 = list.slice(0, 60);
    var tbody = document.getElementById('gainers-body');
    var frag = document.createDocumentFragment();
    tbody.innerHTML = '';
    
    for(var i = 0; i < t60.length; i++){
        var p = t60[i];
        var bd = buildBadges(p, ld, tfs);
        var iw = watchlist.has(p.symbol);
        var tr = document.createElement('tr');
        if(bd.isGolden) tr.className = 'golden-zone';
        // Render: Rank, Symbol (+ WB Label if true), 15M%, 24H%, Watch Button
        tr.innerHTML = 
            '<td class="col-rank">'+(i+1)+'</td>'+
            '<td class="col-sym" onclick="openChart(\''+p.symbol+'\')">'+p.symbol+(p.wb15m?'<span class="wb-badge">WB</span>':'')+bd.badges+'</td>'+
            '<td class="col-pct '+(p['15m']>=0?'green':'red')+'">'+(p['15m']||0).toFixed(2)+'%</td>'+
            '<td class="col-pct '+(p['24h']>=0?'green':'red')+'">'+(p['24h']||0).toFixed(2)+'%</td>'+
            '<td class="col-action"><button class="btn-add" onclick="event.stopPropagation();toggleWatch(\''+p.symbol+'\')" style="'+(iw?'color:var(--accent);border-color:var(--accent);':'')+'">'+(iw?'&#9733;':'+')+'</button></td>';
        frag.appendChild(tr);
    }
    tbody.appendChild(frag);
    
    var ws = Array.from(watchlist);
    var wd = ws.map(function(s){ return pairs[s+'USDT']; }).filter(Boolean);
    wd.sort(function(a,b){ return (b['24h']||-999) - (a['24h']||-999); });
    document.getElementById('wl-count').innerText = wd.length + ' asset' + (wd.length!==1?'s':'');
    document.getElementById('wl-empty').style.display = wd.length===0 ? 'block' : 'none';
    var wlBody = document.getElementById('watchlist-body');
    var wlFrag = document.createDocumentFragment();
    wlBody.innerHTML = '';
    for(var j = 0; j < wd.length; j++){
        var wp = wd[j], wbd = buildBadges(wp, ld, tfs);
        var wps = wp.price < 1 ? '$' + wp.price.toFixed(5) : '$' + wp.price.toLocaleString();
        var tr = document.createElement('tr');
        if(wbd.isGolden) tr.className = 'golden-zone';
        tr.innerHTML = '<td class="col-rank">'+(j+1)+'</td><td class="wl-sym" onclick="openChart(\''+wp.symbol+'\')">'+wp.symbol+wbd.badges+'</td><td class="wl-price">'+wps+'</td><td class="wl-pct '+(wp['24h']>=0?'green':'red')+' '+(rankBy==='24h'?'active-col':'')+'">'+(wp['24h']||0).toFixed(2)+'%</td><td class="wl-vol">'+formatVol(wp.vol24h)+'</td><td class="wl-avol">'+formatVol(wp.avgDVol)+'</td><td class="wl-action"><button class="btn-remove" onclick="event.stopPropagation();toggleWatch(\''+wp.symbol+'\')">&#10005;</button></td>';
        wlFrag.appendChild(tr);
    }
    wlBody.appendChild(wlFrag);
}
